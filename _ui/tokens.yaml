# Strale Beacon — Design Tokens
# Light-mode adaptation of Strale's design system
# Source: Strale frontend (Inter, 0.5rem radius, HSL color system)

color:
  # Brand (adapted from Strale's primary: hsl 225 42% 52%)
  brand:
    primary: "hsl(225, 50%, 45%)"           # Darker for light-mode contrast
    primary-hover: "hsl(225, 50%, 38%)"
    primary-light: "hsl(225, 50%, 95%)"     # Light tint for backgrounds
    primary-foreground: "#FFFFFF"

  # Backgrounds
  background:
    page: "#FFFFFF"
    surface: "#F9FAFB"
    elevated: "#FFFFFF"
    muted: "#F3F4F6"

  # Text
  text:
    primary: "#111827"
    secondary: "#6B7280"
    muted: "#9CA3AF"
    inverse: "#FFFFFF"

  # Borders
  border:
    default: "#E5E7EB"
    strong: "#D1D5DB"
    muted: "#F3F4F6"

  # Tier colors (Beacon-specific)
  tier:
    green:
      base: "#16A34A"
      light: "#F0FDF4"
      border: "#BBF7D0"
      text: "#15803D"
    yellow:
      base: "#CA8A04"
      light: "#FEFCE8"
      border: "#FEF08A"
      text: "#A16207"
    red:
      base: "#DC2626"
      light: "#FEF2F2"
      border: "#FECACA"
      text: "#B91C1C"

  # Functional
  success: "#16A34A"
  warning: "#CA8A04"
  error: "#DC2626"
  info: "hsl(225, 50%, 45%)"

typography:
  font-family:
    sans: "'Inter', system-ui, sans-serif"
    mono: "'JetBrains Mono', monospace"
  font-size:
    xs: "0.75rem"      # 12px
    sm: "0.875rem"     # 14px
    base: "1rem"       # 16px
    lg: "1.125rem"     # 18px
    xl: "1.25rem"      # 20px
    2xl: "1.5rem"      # 24px
    3xl: "1.875rem"    # 30px
    4xl: "2.25rem"     # 36px
  font-weight:
    normal: 400
    medium: 500
    semibold: 600
    bold: 700
  line-height:
    tight: 1.25
    normal: 1.5
    relaxed: 1.625

spacing:
  # 4px base unit (matches Strale)
  scale:
    0: "0"
    1: "0.25rem"     # 4px
    2: "0.5rem"      # 8px
    3: "0.75rem"     # 12px
    4: "1rem"        # 16px
    6: "1.5rem"      # 24px
    8: "2rem"        # 32px
    12: "3rem"       # 48px
    16: "4rem"       # 64px

border:
  radius:
    none: "0"
    sm: "0.25rem"    # 4px
    md: "0.375rem"   # 6px
    default: "0.5rem"  # 8px — matches Strale
    lg: "0.75rem"    # 12px
    xl: "1rem"       # 16px
    full: "9999px"
  width:
    default: "1px"
    2: "2px"

shadow:
  sm: "0 1px 2px 0 rgba(0, 0, 0, 0.05)"
  default: "0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1)"
  md: "0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1)"
  lg: "0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1)"

transition:
  fast: "150ms ease"
  default: "200ms ease"
  slow: "300ms ease"

breakpoints:
  sm: "640px"
  md: "768px"
  lg: "1024px"
  xl: "1280px"
